name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_BUTTONDOWN_USERNAME: ${{ vars.PUBLIC_BUTTONDOWN_USERNAME }}
      PUBLIC_CONTACT_FORM_ENDPOINT: ${{ vars.PUBLIC_CONTACT_FORM_ENDPOINT }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required public env vars
        run: |
          missing=0
          for var in PUBLIC_BUTTONDOWN_USERNAME PUBLIC_CONTACT_FORM_ENDPOINT PUBLIC_TURNSTILE_SITE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required GitHub Actions Variable '$var' is empty or missing."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "::error::Add these in Settings → Secrets and variables → Actions → Variables (not Secrets)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check (astro check)
        run: yarn typecheck

      - name: Build
        run: yarn build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
